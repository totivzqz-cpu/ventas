<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Stock - 13 Picos</title>
    <style>
        body { font-family: Arial, sans-serif; font-size: 11px; margin: 10px; background-color: #f0f0f0; }
        .contenedor { background: #e0e0e0; padding: 15px; border: 1px solid #999; width: 1000px; margin: auto; }
        
        /* Monitoreo superior */
        .grid-tanques { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .tanque-card { background: white; border: 1px solid #444; border-radius: 5px; padding: 8px; text-align: center; }
        .alerta-critica { background: #ffcccc !important; border: 2px solid #d32f2f !important; }
        .tanque-header { font-weight: bold; background: #333; color: white; margin: -8px -8px 8px -8px; padding: 5px; }
        .vaso-medidor { height: 70px; width: 45px; border: 2px solid #333; margin: 5px auto; position: relative; background: #eee; }
        .fluido { position: absolute; bottom: 0; width: 100%; }
        
        /* Formulario */
        .seccion-form { background: #fff; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .form-header { background: #000; color: #ffeb3b; padding: 8px; font-weight: bold; margin-bottom: 15px; text-align: center; }
        .grid-form { display: grid; grid-template-columns: 1.2fr 1fr 1.8fr; gap: 15px; }
        
        .titulo-col { background: #444; color: white; padding: 5px; font-weight: bold; text-align: center; margin-bottom: 10px; }
        .grupo-campo { margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; background: #f9f9f9; padding: 3px 5px; border-radius: 3px; }
        
        input, select { width: 85px; border: 1px solid #999; padding: 3px; text-align: right; font-weight: bold; }
        .input-largo { width: 120px; }
        
        .surtidor-label { background: #ddd; padding: 2px 5px; font-weight: bold; display: block; margin-top: 10px; border-left: 4px solid #333; }
        
        button { width: 100%; padding: 12px; background: #004d40; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 13px; }
        button:hover { background: #00251a; }

        /* Colores de fluido */
        .color-n93 { background: #ffeb3b; } .color-n97 { background: #0d6efd; }
        .color-gco { background: #000; } .color-gsm { background: #9e9e9e; }
        .color-glp { background: #fd7e14; }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="grid-tanques" id="gridTanques"></div>

    <div class="seccion-form">
        <div class="form-header">REGISTRO INTEGRAL: COMPRA, NIVELES Y 13 PICOS</div>
        
        <form id="formMaster">
            <div class="grid-form">
                
                <div>
                    <div class="titulo-col">COMPRA / FACTURA</div>
                    <div class="grupo-campo"><label>N° Factura:</label><input type="text" id="f_num" class="input-largo"></div>
                    <div class="grupo-campo">
                        <label>Producto:</label>
                        <select id="f_prod" class="input-largo">
                            <option value="N93">NAFTA 93 (Amarillo)</option>
                            <option value="N97">NAFTA 97 (Azul)</option>
                            <option value="GCO">GCO (Negro)</option>
                            <option value="GSM">GSM (Gris)</option>
                            <option value="GLP">GLP (Naranja)</option>
                        </select>
                    </div>
                    <div class="grupo-campo"><label>Litros:</label><input type="number" id="f_lts" class="input-largo"></div>
                    <div class="grupo-campo">
                        <label>Tanque:</label>
                        <select id="f_tan" class="input-largo">
                            <option value="1">Tanque 1 (GCO)</option>
                            <option value="2">Tanque 2 (GSM)</option>
                            <option value="3">Tanque 3 (N93)</option>
                            <option value="4">Tanque 4 (N97)</option>
                            <option value="5">Tanque 5 (N93)</option>
                            <option value="6">Tanque 6 (N97)</option>
                            <option value="7">Tanque 7 (GCO)</option>
                            <option value="8">Tanque 8 (GLP)</option>
                        </select>
                    </div>
                </div>

                <div>
                    <div class="titulo-col">VARILLA (LTS)</div>
                    <div class="grupo-campo"><label>T1 (GCO):</label><input type="number" step="0.01"></div>
                    <div class="grupo-campo"><label>T2 (GSM):</label><input type="number" step="0.01"></div>
                    <div class="grupo-campo"><label>T3 (N93):</label><input type="number" step="0.01"></div>
                    <div class="grupo-campo"><label>T4 (N97):</label><input type="number" step="0.01"></div>
                    <div class="grupo-campo"><label>T5 (N93):</label><input type="number" step="0.01"></div>
                    <div class="grupo-campo"><label>T6 (N97):</label><input type="number" step="0.01"></div>
                    <div class="grupo-campo"><label>T7 (GCO):</label><input type="number" step="0.01"></div>
                    <div class="grupo-campo"><label>T8 (GLP):</label><input type="number" step="0.01"></div>
                </div>

                <div>
                    <div class="titulo-col">TOTALIZADORES (13 PICOS)</div>
                    
                    <span class="surtidor-label">SURTIDOR 1</span>
                    <div class="grupo-campo"><label>Pico 1 (N93):</label><input type="number" step="0.01"></div>
                    <div class="grupo-campo"><label>Pico 2 (N93):</label><input type="number" step="0.01"></div>
                    <div class="grupo-campo"><label>Pico 3 (N97):</label><input type="number" step="0.01"></div>
                    <div class="grupo-campo"><label>Pico 4 (N97):</label><input type="number" step="0.01"></div>
                    <div class="grupo-campo"><label>Pico 5 (GSM):</label><input type="number" step="0.01"></div>
                    <div class="grupo-campo"><label>Pico 6 (GSM):</label><input type="number" step="0.01"></div>

                    <span class="surtidor-label">SURTIDOR 2</span>
                    <div class="grupo-campo"><label>Pico 7 (N93):</label><input type="number" step="0.01"></div>
                    <div class="grupo-campo"><label>Pico 8 (N93):</label><input type="number" step="0.01"></div>
                    <div class="grupo-campo"><label>Pico 9 (N97):</label><input type="number" step="0.01"></div>
                    <div class="grupo-campo"><label>Pico 10 (N97):</label><input type="number" step="0.01"></div>
                    <div class="grupo-campo"><label>Pico 11 (GCO):</label><input type="number" step="0.01"></div>
                    <div class="grupo-campo"><label>Pico 12 (GCO):</label><input type="number" step="0.01"></div>

                    <span class="surtidor-label">SURTIDOR GAS</span>
                    <div class="grupo-campo"><label>Pico 13 (GLP):</label><input type="number" step="0.01"></div>
                </div>
            </div>
            
            <button type="button" onclick="confirmar()">CERRAR COMPRA Y ACTUALIZAR TOTALIZADORES</button>
        </form>
    </div>
</div>

<script>
    // Configuración visual idéntica a la anterior...
    const NIVELES_CRITICOS = { 'N93': 2000, 'N97': 2000, 'GCO': 900, 'GSM': 900, 'GLP': 700 };
    const CONFIG_TANQUES = [
        { id: 1, prod: 'GCO', cap: 7000, color: 'color-gco' }, { id: 2, prod: 'GSM', cap: 7000, color: 'color-gsm' },
        { id: 3, prod: 'N93', cap: 8000, color: 'color-n93' }, { id: 4, prod: 'N97', cap: 8000, color: 'color-n97' },
        { id: 5, prod: 'N93', cap: 10000, color: 'color-n93' }, { id: 6, prod: 'N97', cap: 10000, color: 'color-n97' },
        { id: 7, prod: 'GCO', cap: 10000, color: 'color-gco' }, { id: 8, prod: 'GLP', cap: 7000, color: 'color-glp' }
    ];

    function renderTanques(datos) {
        const grid = document.getElementById('gridTanques');
        grid.innerHTML = '';
        CONFIG_TANQUES.forEach(t => {
            const litros = datos[t.id] || 0;
            const pct = (litros / t.cap) * 100;
            const card = document.createElement('div');
            card.className = `tanque-card ${litros <= NIVELES_CRITICOS[t.prod] ? 'alerta-critica' : ''}`;
            card.innerHTML = `<div class="tanque-header">T${t.id} - ${t.prod}</div>
                <div class="vaso-medidor"><div class="fluido ${t.color}" style="height:${pct}%"></div></div>
                <div style="font-size:9px"><b>${litros.toLocaleString()} L</b></div>`;
            grid.appendChild(card);
        });
    }

    function confirmar() {
        if(confirm("¿Desea registrar la compra y establecer estos 13 totalizadores como punto de control?")) {
            alert("Sincronizando con Google Sheets...");
        }
    }

    window.onload = () => renderTanques({1:6000, 2:850, 3:1800, 4:5000, 5:9000, 6:4000, 7:7500, 8:3000});
</script>
</body>
</html>
