<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitoreo Real-Time - Alberdi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        
        .tanque { 
            background: #2d2d2d; border-radius: 12px; padding: 20px; 
            border: 1px solid #444; position: relative; overflow: hidden;
        }
        
        .critico { border: 2px solid #ff4444; box-shadow: 0 0 15px rgba(255, 68, 68, 0.4); animation: flash 1.5s infinite; }
        @keyframes flash { 0% { background: #2d2d2d; } 50% { background: #4d1a1a; } 100% { background: #2d2d2d; } }

        .vaso { 
            width: 70px; height: 130px; border: 3px solid #eee; margin: 15px auto; 
            position: relative; background: #111; border-radius: 0 0 10px 10px;
        }
        .fluido { position: absolute; bottom: 0; width: 100%; transition: height 2s ease-in-out; }
        
        .info { font-size: 22px; font-weight: bold; margin: 10px 0; font-family: 'Courier New', monospace; }
        .label { font-size: 14px; color: #aaa; font-weight: bold; }
        .capacidad { font-size: 10px; color: #777; }

        /* Colores de Fluidos */
        .n93 { background: #ffeb3b; box-shadow: 0 0 10px #ffeb3b; }
        .n97 { background: #007bff; box-shadow: 0 0 10px #007bff; }
        .gco { background: #555; }
        .gsm { background: #9e9e9e; }
        .glp { background: #fd7e14; box-shadow: 0 0 10px #fd7e14; }
        
        .btn-refresh { 
            background: #ffeb3b; color: black; border: none; padding: 12px 30px; 
            font-weight: bold; cursor: pointer; border-radius: 5px; margin-bottom: 30px; font-size: 16px;
        }
        #status { font-size: 12px; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1 style="color: #ffeb3b;">SISTEMA DE MONITOREO ALBERDI</h1>
    <div id="status">Esperando actualización...</div>
    <button class="btn-refresh" onclick="cargarDesdeScript()">🔄 ACTUALIZAR ESTADO DE TANQUES</button>

    <div class="grid" id="panel">
        </div>

<script>
    // URL de tu Script
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxgDwm_R3oE9F9XTVcFl-vzAw5k4KHXg4s8CqS3MUgruoVMmOwVJ-YkcpQmvYIpKIjaKQ/exec";

    const CONFIG = [
        { id: 1, prod: 'GCO', cap: 7000, clase: 'gco', lim: 200 },
        { id: 2, prod: 'GSM', cap: 7000, clase: 'gsm', lim: 900 },
        { id: 3, prod: 'N93', cap: 8000, clase: 'n93', lim: 2000 },
        { id: 4, prod: 'N97', cap: 8000, clase: 'n97', lim: 2000 },
        { id: 5, prod: 'N93', cap: 10000, clase: 'n93', lim: 2000 },
        { id: 6, prod: 'N97', cap: 10000, clase: 'n97', lim: 2000 },
        { id: 7, prod: 'GCO', cap: 10000, clase: 'gco', lim: 900 },
        { id: 8, prod: 'GLP', cap: 7000, clase: 'glp', lim: 700 }
    ];

    function cargarDesdeScript() {
        document.getElementById('status').innerText = "Consultando base de datos...";
        
        // Usamos JSONP (una técnica para saltar el bloqueo del navegador)
        const script = document.createElement('script');
        script.src = SCRIPT_URL + "?action=leerMonitoreo&callback=mostrarResultados";
        document.body.appendChild(script);
        document.body.removeChild(script);
    }

    function mostrarResultados(stocks) {
        document.getElementById('status').innerText = "Última actualización: " + new Date().toLocaleTimeString();
        const panel = document.getElementById('panel');
        panel.innerHTML = '';

        CONFIG.forEach(t => {
            const lts = Math.round(stocks[t.id]) || 0;
            const pct = Math.min((lts / t.cap) * 100, 100);
            const esCritico = lts <= t.lim;

            panel.innerHTML += `
                <div class="tanque ${esCritico ? 'critico' : ''}">
                    <div class="label">T${t.id} - ${t.prod}</div>
                    <div class="vaso">
                        <div class="fluido ${t.clase}" style="height: ${pct}%"></div>
                    </div>
                    <div class="info">${lts.toLocaleString()} L</div>
                    <div class="capacidad">${pct.toFixed(1)}% lleno</div>
                </div>
            `;
        });
    }

    // Cargar al iniciar
    window.onload = cargarDesdeScript;
</script>
</body>
</html>
