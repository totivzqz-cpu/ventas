<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto Inicial - Sistema Alberdi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 11px; margin: 0; background-color: #eceff1; color: #37474f; }
        .contenedor { width: 95%; max-width: 1000px; margin: 20px auto; background: #cfd8dc; padding: 20px; border: 1px solid #90a4ae; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { background: #263238; color: #ffeb3b; padding: 15px; text-align: center; border-radius: 6px; margin-bottom: 20px; }
        .seccion { background: white; padding: 20px; border-radius: 6px; border: 1px solid #b0bec5; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 20px; }
        .titulo-col { background: #546e7a; color: white; padding: 8px; font-weight: bold; text-align: center; border-radius: 4px; margin-bottom: 12px; }
        .campo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; border-bottom: 1px solid #f1f1f1; padding-bottom: 3px; }
        label { font-weight: 600; }
        input { width: 90px; border: 1px solid #cfd8dc; padding: 4px; text-align: right; background: #fffde7; font-weight: bold; border-radius: 3px; }
        .sep-sur { background: #f5f5f5; padding: 4px; font-weight: bold; margin-top: 12px; border-left: 4px solid #263238; display: block; }
        .btn { width: 100%; padding: 16px; background: #1a237e; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 13px; border-radius: 4px; text-transform: uppercase; }
        .btn:disabled { background: #9fa8da; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="header">
        <h2 style="margin:0;">CONFIGURACIÓN DE PUNTO CERO</h2>
        <small>Registro inicial de tanques y totalizadores</small>
    </div>

    <div class="seccion">
        <form id="formInit">
            <div class="grid">
                <div>
                    <div class="titulo-col">DATOS GENERALES</div>
                    <div class="campo"><label>Fecha:</label><input type="date" id="f_fecha" required style="width:120px"></div>
                    <div class="campo"><label>Responsable:</label><input type="text" id="f_resp" required style="width:120px"></div>
                </div>

                <div>
                    <div class="titulo-col">VARILLA INICIAL (L)</div>
                    <div id="contTanques"></div>
                </div>

                <div>
                    <div class="titulo-col">TOTALIZADORES (13)</div>
                    <div id="contPicos" style="max-height: 400px; overflow-y: auto; padding-right: 10px;"></div>
                </div>
            </div>

            <button type="button" id="btn" class="btn" onclick="enviar()">Guardar en Control_Inicial</button>
        </form>
    </div>
</div>

<script>
    const URL_APP = "https://script.google.com/macros/s/AKfycbxgDwm_R3oE9F9XTVcFl-vzAw5k4KHXg4s8CqS3MUgruoVMmOwVJ-YkcpQmvYIpKIjaKQ/exec";

    const TANQUES = ["T1 (GCO)", "T2 (GSM)", "T3 (N93)", "T4 (N97)", "T5 (N93)", "T6 (N97)", "T7 (GCO)", "T8 (GLP)"];
    const SURTIDORES = [
        { nom: "S1", picos: ["N93", "N93", "N97", "N97", "GSM", "GSM"] },
        { nom: "S2", picos: ["N93", "N93", "N97", "N97", "GCO", "GCO"] },
        { nom: "GAS", picos: ["GLP"] }
    ];

    function init() {
        let htmlT = '';
        TANQUES.forEach(t => htmlT += `<div class="campo"><label>${t}:</label><input type="number" step="0.01" class="t-in"></div>`);
        document.getElementById('contTanques').innerHTML = htmlT;

        let htmlP = '';
        let c = 1;
        SURTIDORES.forEach(s => {
            htmlP += `<span class="sep-sur">SURTIDOR ${s.nom}</span>`;
            s.picos.forEach(p => {
                htmlP += `<div class="campo"><label>Pico ${c} (${p}):</label><input type="number" step="0.01" class="p-in"></div>`;
                c++;
            });
        });
        document.getElementById('contPicos').innerHTML = htmlP;
    }

    async function enviar() {
        const fecha = document.getElementById('f_fecha').value;
        const resp = document.getElementById('f_resp').value;
        if(!fecha || !resp) return alert("Complete Fecha y Responsable");

        const tVals = Array.from(document.querySelectorAll('.t-in')).map(i => parseFloat(i.value) || 0);
        const pVals = Array.from(document.querySelectorAll('.p-in')).map(i => parseFloat(i.value) || 0);

        if(!confirm("¿Registrar estos valores como PUNTO CERO?")) return;

        const btn = document.getElementById('btn');
        btn.disabled = true;
        btn.innerText = "PROCESANDO...";

        const payload = {
            action: "guardarInicial",
            fecha: fecha,
            responsable: resp,
            tanques: tVals,
            picos: pVals
        };

        try {
            // Enviamos el action en la URL para mayor seguridad
            await fetch(URL_APP + "?action=guardarInicial", {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            alert("¡ÉXITO! Los datos se han enviado. Revisa la pestaña 'Control_Inicial'.");
            document.getElementById('formInit').reset();
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "Guardar en Control_Inicial";
        }
    }

    window.onload = init;
</script>
</body>
</html>
